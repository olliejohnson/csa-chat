plugins {
    id 'java'
    id 'application'
}

group = 'io.oliverj.chat'
version = '1.0-SNAPSHOT'

application {
    mainClass = 'io.oliverj.chat.server.Application'
}

repositories {
    mavenCentral()
}

dependencies {
    testImplementation platform('org.junit:junit-bom:6.0.0')
    testImplementation 'org.junit.jupiter:junit-jupiter'
    testRuntimeOnly 'org.junit.platform:junit-platform-launcher'

    implementation 'io.netty:netty-all:4.2.14.Final'
    implementation 'org.hibernate.orm:hibernate-core:7.3.5.Final'
    implementation 'org.mongodb:mongodb-hibernate:1.0.0-alpha0'

    implementation 'org.slf4j:slf4j-api:2.0.18'
    implementation 'org.slf4j:slf4j-simple:2.0.18'
}

test {
    useJUnitPlatform()
}